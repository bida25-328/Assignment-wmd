<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Page</title>
  
   <link rel="stylesheet" href="style.css">
  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;

     
    }

    .logo {
      font-size: 1.5em;
      font-weight: bold;
    }

    main {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .contacts {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .box {
      flex: 1;
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .form-section {
      background: #fff;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .form-section h2 {
      margin-top: 0;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .form-group input[type="radio"] {
      width: auto;
      margin-right: 5px;
    }

    button {
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .contacts {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="C:\Users\Nomsa Audrey Soloba\OneDrive\Desktop\images\logo.png" alt=" My Logo" width="150" class="logo">
    
      <nav>
            <a href="index.html">Home</a> |
            <a href="about.html">About</a> |
            <a href="snakes.html">Rare Snakes</a>|
            <a href="gallery.html"> Gallery</a> | 
            <a href="visit.html"> visit us</a>| 
            <a href="contact.html">Contact</a>
        </nav>
    
  </header>

  <main>
    <div class="contacts">
      <div class="box">
        <h2>Park 1 Contacts</h2>
        <p>Address, phone, email info here...</p>
      </div>
      <div class="box">
        <h2>Park 2 Contacts</h2>
        <p>Address, phone, email info here...</p>
      </div>
    </div>

    <div class="form-section">
      <h2>ENQUIRY FORM</h2>
      <form>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name">
        </div>

        <div class="form-group">
          <label for="email">EMAIL</label>
          <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone">
        </div>

        <div class="form-group">
          <label for="details">Details</label>
          <textarea id="details" name="details"></textarea>
        </div>

        <div class="form-group">
          <label>Preferred Contact Method</label>
          <input type="radio" id="contactEmail" name="contactMethod" value="email">
          <label for="contactEmail">Email</label>
          <input type="radio" id="contactPhone" name="contactMethod" value="phone">
          <label for="contactPhone">Phone</label>
        </div>

        <div class="form-group">
          <label for="date">Date of Enquiry</label>
          <input type="date" id="date" name="date">
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>
  </main>

  <footer>
    <p>@copyright</p>
  </footer>
</body>
</html>
